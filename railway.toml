[build]
builder = "NIXPACKS"
# Only install deps — do NOT run the Vite frontend build
buildCommand = "npm install"

[deploy]
startCommand = "node server/yahooServer.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environment]
NODE_VERSION = "22"
